<!DOCTYPE html>
<html>
<head>
<title>Final Message</title>
</head>

<body style="background:black;color:#00ffcc;font-family:monospace;padding:40px;overflow:hidden;">

<h3>// final_message</h3>

<p>
Some people enter life quietly,
but end up meaning a lot.
</p>

<p>
You are one of those people.
</p>

<p>
And someone is very happy
that you exist.
</p>

<script>

function heart(){

const h=document.createElement("div");

h.innerHTML="❤️";

h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
h.style.fontSize="20px";

document.body.appendChild(h);

setTimeout(()=>{h.remove()},4000);

}

setInterval(heart,500);

</script>

</body>
</html>
